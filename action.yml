name: weread2notion sync
description: Preserve a WeRead2Notion Pro dashboard while syncing complete WeRead data.
author: malinkang

inputs:
  weread-api-key:
    description: WeRead Gateway API key.
    required: true
  notion-token:
    description: Notion integration token.
    required: true
  notion-page:
    description: Root WeRead2Notion Pro page URL or ID.
    required: true
  full:
    description: Back up, archive, and rebuild all database rows.
    required: false
    default: "false"
  python-version:
    description: Python version used to run the sync.
    required: false
    default: "3.11"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install weread2notion
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install "$GITHUB_ACTION_PATH"
    - name: Sync WeRead to Notion
      shell: bash
      env:
        WEREAD_API_KEY: ${{ inputs.weread-api-key }}
        NOTION_TOKEN: ${{ inputs.notion-token }}
        NOTION_PAGE: ${{ inputs.notion-page }}
      run: |
        if [ "${{ inputs.full }}" = "true" ]; then
          weread2notion sync --full
        else
          weread2notion sync
        fi
